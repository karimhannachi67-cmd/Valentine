<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عيد حب سعيد 2026</title>
    <style>
        /* إعدادات الخلفية */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2b0000 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* لمنع ظهور أشرطة التمرير بسبب القلوب المتساقطة */
        }

        /* حاوية القلب الرئيسي */
        .container {
            position: relative;
            text-align: center;
            z-index: 10; /* لضمان بقاء الرسالة فوق القلوب المتساقطة */
        }

        .heart-shape {
            position: relative;
            width: 100px;
            height: 90px;
            background-color: #ff0040;
            margin: 0 auto;
            transform: rotate(-45deg);
            animation: beat 0.8s infinite;
            box-shadow: 0 0 40px #ff0040;
            cursor: pointer;
        }

        .heart-shape:before,
        .heart-shape:after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            background-color: #ff0040;
            border-radius: 50%;
        }

        .heart-shape:before { top: -50px; left: 0; }
        .heart-shape:after { left: 50px; top: 0; }

        @keyframes beat {
            0% { transform: scale(1) rotate(-45deg); }
            50% { transform: scale(1.2) rotate(-45deg); }
            100% { transform: scale(1) rotate(-45deg); }
        }

        .message {
            margin-top: 80px;
            color: white;
            opacity: 0;
            transition: opacity 1s ease;
            text-shadow: 0 0 10px #ff0040;
        }

        .container:hover .message { opacity: 1; }

        /* تنسيق القلوب المتساقطة */
        .falling-heart {
            position: absolute;
            color: #ff4d79;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-shape"></div>
        <div class="message">
            <h1>عيد حب سعيد! ❤️</h1>
            <p>أنت الشخص المفضل لدي في عام 2026.</p>
        </div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            
            // اختيار شكل عشوائي للقلب
            const hearts = ['❤️', '💖', '💘', '💕', '💗'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            // تحديد مكان البدء العشوائي (أفقياً)
            heart.style.left = Math.random() * 100 + "vw";
            
            // تحديد مدة السقوط العشوائية (بين 3 إلى 7 ثوانٍ)
            const duration = Math.random() * 4 + 3;
            heart.style.animationDuration = duration + "s";
            
            // حجم عشوائي
            heart.style.fontSize = Math.random() * 20 + 10 + "px";
            
            document.body.appendChild(heart);

            // إزالة القلب بعد انتهاء الحركة لتوفير الذاكرة
            setTimeout(() => {
                heart.remove();
            }, duration * 1000);
        }

        // إنشاء قلب جديد كل 300 مللي ثانية
        setInterval(createHeart, 300);
    </script>
</body>
</html>
