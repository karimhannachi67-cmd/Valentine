<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بطاقة عيد الحب التفاعلية</title>
  
  <style>
    @import url(https://fonts.googleapis.com/css?family=Poiret+One);

    /* تنسيق الخلفية والجسم */
    body {
      background-color: #ddd;
      font-family: 'Poiret One', 'Segoe UI Light', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    /* حاوية البطاقة */
    #card {
      position: relative;
      width: 460px;
      height: 260px;
      cursor: pointer;
    }

    /* تنسيق القلوب المشترك */
    #card .heart {
      width: 260px;
      height: 260px;
      float: left;
      position: absolute;
    }

    #card .heart #circle {
      height: 130px;
      width: 130px;
      border-radius: 50%;
      background-color: #D32F2F;
    }

    #card .heart #rec {
      margin-top: -60px;
      width: 130px;
      height: 130px;
      background-color: #D32F2F;
      border-radius: 35% 0 0 0;
    }

    /* تدوير النصف الثاني لتشكيل القلب */
    #card .heart #half2 {
      transform: rotate(-90deg);
      margin-top: -330px;
      margin-left: -200px;
    }

    /* تنسيق الرسالة المخفية */
    #card #message {
      position: absolute;
      left: 130px;
      width: 200px;
      height: 200px;
      background-color: #333;
      border-radius: 35% 0 35% 0;
      text-align: center;
      z-index: 1;
    }

    #card #message h2 {
      font-size: 20px;
      color: #fff;
      margin-top: 60px;
      padding: 0 10px;
    }

    #card #heart1 {
      z-index: 3;
      transform: rotate(180deg);
      animation: closeLeft 2s ease-in-out forwards;
    }
